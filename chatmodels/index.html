<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RAG Chatbot — Document Q&A</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:       #0D1117;
    --surface:  #161B22;
    --surface2: #1C2333;
    --border:   #30363D;
    --green:    #7EE787;
    --blue:     #58A6FF;
    --purple:   #BC8CFF;
    --text:     #E6EDF3;
    --muted:    #8B949E;
    --user-bg:  #1F3A5F;
    --danger:   #F85149;
    --mono:     'JetBrains Mono', monospace;
    --sans:     'Inter', sans-serif;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); }

  .app { display: grid; grid-template-rows: auto auto 1fr auto; height: 100vh; max-width: 900px; margin: 0 auto; }

  /* Header */
  header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--surface); }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo {
    width: 34px; height: 34px; border-radius: 8px;
    background: linear-gradient(135deg, #2a1a3a, #18101f);
    border: 1px solid var(--purple);
    display: grid; place-items: center;
    font-size: 16px;
  }
  .header-title { font-size: 15px; font-weight: 600; }
  .header-sub { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-top: 2px; }
  .badge { font-family: var(--mono); font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 4px; display: flex; align-items: center; gap: 5px; }
  .badge-local { background: rgba(126,231,135,.12); color: var(--green); border: 1px solid rgba(126,231,135,.3); }
  .badge-rag { background: rgba(188,140,255,.12); color: var(--purple); border: 1px solid rgba(188,140,255,.3); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(126,231,135,.4);}50%{opacity:.7;box-shadow:0 0 0 4px rgba(126,231,135,0);} }
  .badges { display: flex; gap: 8px; }

  /* Context bar */
  .context-bar { display: flex; justify-content: space-between; align-items: center; padding: 6px 20px; border-bottom: 1px solid var(--border); background: var(--surface); font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .clear-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 5px; padding: 3px 9px; font-family: var(--mono); font-size: 11px; cursor: pointer; transition: border-color .15s, color .15s; }
  .clear-btn:hover { border-color: var(--danger); color: var(--danger); }

  /* Messages */
  .messages { overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg { display: flex; gap: 10px; align-items: flex-start; animation: fadeUp .2s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;} }
  .msg.user { flex-direction: row-reverse; }

  .avatar { width: 30px; height: 30px; border-radius: 7px; flex-shrink: 0; margin-top: 2px; font-family: var(--mono); font-size: 11px; font-weight: 600; display: grid; place-items: center; }
  .msg.user .avatar { background: var(--user-bg); color: var(--blue); border: 1px solid rgba(88,166,255,.3); }
  .msg.bot  .avatar { background: rgba(188,140,255,.1); color: var(--purple); border: 1px solid rgba(188,140,255,.3); }

  .bubble-wrap { max-width: 76%; }
  .bubble { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; word-break: break-word; }
  .msg.user .bubble { background: var(--user-bg); border: 1px solid rgba(88,166,255,.2); border-top-right-radius: 3px; }
  .msg.bot  .bubble { background: var(--surface2); border: 1px solid var(--border); border-top-left-radius: 3px; }

  /* Sources */
  .sources { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
  .sources-toggle {
    font-family: var(--mono); font-size: 11px; color: var(--purple);
    cursor: pointer; display: flex; align-items: center; gap: 5px;
    background: none; border: none; padding: 2px 0;
  }
  .sources-toggle:hover { text-decoration: underline; }
  .source-list { display: none; flex-direction: column; gap: 6px; margin-top: 6px; }
  .source-list.open { display: flex; }
  .source-chip {
    background: rgba(188,140,255,.06); border: 1px solid rgba(188,140,255,.2);
    border-radius: 8px; padding: 8px 10px; font-size: 12px; color: var(--muted);
    line-height: 1.5;
  }
  .source-chip .source-num { color: var(--purple); font-family: var(--mono); font-weight: 600; margin-right: 6px; }

  .typing-dots { display: flex; gap: 4px; padding: 4px 0; }
  .typing-dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: blink 1.2s infinite; }
  .typing-dots span:nth-child(2){animation-delay:.2s;} .typing-dots span:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,80%,100%{opacity:.2;}40%{opacity:1;}}

  .msg.system { justify-content: center; }
  .sys-text { font-size: 11px; color: var(--muted); font-family: var(--mono); background: var(--surface2); border: 1px solid var(--border); padding: 4px 12px; border-radius: 20px; }

  /* Empty state */
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 10px; color: var(--muted); text-align: center; padding: 40px; }
  .empty-state .icon { font-size: 48px; margin-bottom: 4px; }
  .empty-state h2 { font-size: 16px; color: var(--text); font-weight: 600; }
  .empty-state p { font-size: 13px; line-height: 1.6; max-width: 320px; }

  /* Input */
  .input-area { padding: 14px 20px 18px; border-top: 1px solid var(--border); background: var(--surface); }
  .input-row { display: flex; gap: 10px; align-items: flex-end; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 8px 8px 8px 14px; transition: border-color .15s; }
  .input-row:focus-within { border-color: rgba(188,140,255,.5); }
  textarea { flex: 1; background: none; border: none; outline: none; resize: none; color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.5; min-height: 22px; max-height: 140px; }
  textarea::placeholder { color: var(--muted); }
  .send-btn { width: 34px; height: 34px; border-radius: 8px; border: none; cursor: pointer; background: var(--purple); color: #0D1117; display: grid; place-items: center; flex-shrink: 0; transition: background .15s, transform .1s; }
  .send-btn:hover { background: #cda6ff; }
  .send-btn:active { transform: scale(.93); }
  .send-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
  .send-btn svg { width: 16px; height: 16px; }
  .input-hint { font-size: 11px; color: var(--muted); margin-top: 7px; text-align: center; font-family: var(--mono); }
  .input-hint kbd { background: var(--surface2); border: 1px solid var(--border); border-radius: 3px; padding: 1px 5px; font-size: 10px; }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="header-left">
      <div class="logo">📚</div>
      <div>
        <div class="header-title">RAG Chatbot</div>
        <div class="header-sub">ChromaDB · nomic-embed-text · llama3.2:3b</div>
      </div>
    </div>
    <div class="badges">
      <div class="badge badge-local"><span class="dot"></span>LOCAL</div>
      <div class="badge badge-rag">RAG</div>
    </div>
  </header>

  <div class="context-bar">
    <span id="ctx-label">0 messages · MMR retrieval (k=4)</span>
    <button class="clear-btn" onclick="clearChat()">clear chat</button>
  </div>

  <div class="messages" id="messages">
    <div class="empty-state" id="empty-state">
      <div class="icon">📚</div>
      <h2>Ask about your documents</h2>
      <p>Answers are generated only from content found in your ChromaDB vector store.</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="user-input" placeholder="Ask a question about your documents…" rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="input-hint"><kbd>Enter</kbd> send · <kbd>Shift+Enter</kbd> new line</div>
  </div>

</div>
<script>
  const API = "http://localhost:5000";

  let msgCount = 0;
  let isTyping = false;

  const msgContainer = document.getElementById("messages");
  const inputEl       = document.getElementById("user-input");
  const sendBtn        = document.getElementById("send-btn");
  const ctxLabel        = document.getElementById("ctx-label");

  function updateCtx() {
    ctxLabel.textContent = `${msgCount} message${msgCount !== 1 ? "s" : ""} · MMR retrieval (k=4)`;
  }

  function scrollBottom() { msgContainer.scrollTop = msgContainer.scrollHeight; }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 140) + "px";
  }

  function escHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function renderMarkdown(text) {
    return text
      .replace(/```([\s\S]*?)```/g, (_,c) => `<pre><code>${escHtml(c.trim())}</code></pre>`)
      .replace(/`([^`]+)`/g, (_,c) => `<code>${escHtml(c)}</code>`)
      .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
      .replace(/\n/g, "<br>");
  }

  function appendUserMsg(content) {
    const es = document.getElementById("empty-state");
    if (es) es.remove();

    const wrap = document.createElement("div");
    wrap.className = "msg user";

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = "you";

    const bubbleWrap = document.createElement("div");
    bubbleWrap.className = "bubble-wrap";
    bubbleWrap.innerHTML = `<div class="bubble">${escHtml(content).replace(/\n/g,"<br>")}</div>`;

    wrap.append(avatar, bubbleWrap);
    msgContainer.appendChild(wrap);
    scrollBottom();
    return wrap;
  }

  function appendBotMsg(content, sources, id) {
    const wrap = document.createElement("div");
    wrap.className = "msg bot";
    if (id) wrap.id = id;

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = "ai";

    const bubbleWrap = document.createElement("div");
    bubbleWrap.className = "bubble-wrap";

    if (content === "__typing__") {
      bubbleWrap.innerHTML = `<div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
    } else {
      let sourcesHtml = "";
      if (sources && sources.length > 0) {
        const uid = "src_" + Math.random().toString(36).slice(2);
        sourcesHtml = `
          <div class="sources">
            <button class="sources-toggle" onclick="toggleSources('${uid}')">📎 ${sources.length} source${sources.length !== 1 ? "s" : ""} used ▾</button>
            <div class="source-list" id="${uid}">
              ${sources.map((s, i) => `
                <div class="source-chip">
                  <span class="source-num">[${i + 1}]</span>${escHtml(s.content)}...
                </div>
              `).join("")}
            </div>
          </div>`;
      }
      bubbleWrap.innerHTML = `<div class="bubble">${renderMarkdown(content)}</div>${sourcesHtml}`;
    }

    wrap.append(avatar, bubbleWrap);
    msgContainer.appendChild(wrap);
    scrollBottom();
    return wrap;
  }

  function toggleSources(id) {
    document.getElementById(id).classList.toggle("open");
  }

  function addSystem(text) {
    const row = document.createElement("div");
    row.className = "msg system";
    row.innerHTML = `<span class="sys-text">${text}</span>`;
    msgContainer.appendChild(row);
    scrollBottom();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isTyping) return;

    inputEl.value = "";
    autoResize(inputEl);
    isTyping = true;
    sendBtn.disabled = true;

    appendUserMsg(text);
    msgCount++;
    updateCtx();

    const typingEl = appendBotMsg("__typing__", null, "typing-indicator");

    try {
      const res = await fetch(`${API}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
      });

      if (!res.ok) throw new Error(`Server error ${res.status}`);

      const data = await res.json();
      typingEl.remove();
      appendBotMsg(data.reply, data.sources);
      msgCount++;
      updateCtx();

    } catch (err) {
      typingEl.remove();
      appendBotMsg(`⚠️ Cannot reach RAG server.\n\nMake sure it's running:\n\`\`\`\npython app.py\n\`\`\``);
      addSystem("connection failed — is app.py running?");
    }

    isTyping = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }

  function clearChat() {
    msgCount = 0;
    msgContainer.innerHTML = `
      <div class="empty-state" id="empty-state">
        <div class="icon">📚</div>
        <h2>Chat cleared</h2>
        <p>Ask a new question about your documents.</p>
      </div>`;
    updateCtx();
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  updateCtx();
  inputEl.focus();
</script>
</body>
</html>
